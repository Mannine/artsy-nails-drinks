<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Artsy Nails · Drink Bar QR Sign (printable)</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a24b;
      --gold-deep: #8f6e2a;
      --black: #1c1b17;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Nunito", sans-serif;
      background: #f2efe9;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }
    .toolbar { margin-bottom: 18px; }
    .toolbar button {
      background: var(--black);
      color: #e3c878;
      border: none;
      border-radius: 999px;
      padding: 12px 28px;
      font: 800 16px "Nunito", sans-serif;
      cursor: pointer;
    }
    /* The sign itself — sized to print nicely on letter paper */
    .sign {
      background: #fff;
      width: 7.5in;
      max-width: 100%;
      padding: 0.7in 0.6in;
      text-align: center;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }
    .kicker {
      color: var(--gold-deep);
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-size: 15px;
      margin: 0 0 10px;
    }
    h1 {
      font-family: "Playfair Display", Georgia, serif;
      color: var(--black);
      font-size: 52px;
      line-height: 1.1;
      margin: 0 0 8px;
    }
    .sub {
      font-size: 20px;
      font-weight: 700;
      color: #5a5e6d;
      margin: 0 0 28px;
    }
    .qr-wrap {
      display: inline-block;
      padding: 18px;
      border: 4px solid var(--gold);
      border-radius: 18px;
    }
    .qr-wrap img { display: block; width: 3.4in; height: 3.4in; }
    .scan {
      font-size: 22px;
      font-weight: 800;
      color: var(--black);
      margin: 24px 0 4px;
    }
    .menu-hint {
      font-size: 15px;
      font-weight: 600;
      color: #5a5e6d;
      margin: 0 0 18px;
    }
    .foot {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold-deep);
    }
    @media print {
      body { background: #fff; padding: 0; }
      .toolbar { display: none; }
      .sign { box-shadow: none; border-radius: 0; width: 100%; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button onclick="window.print()">🖨️ Print this sign</button>
  </div>

  <div class="sign">
    <p class="kicker">Artsy Nails</p>
    <h1>Free drinks while<br>you get gorgeous</h1>
    <p class="sub">Champagne, wine, lattes, iced coffee &amp; more — on us 💅</p>

    <div class="qr-wrap">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=680x680&margin=2&color=1c1b17&data=https%3A%2F%2Fmannine.github.io%2Fartsy-drinks%2F"
           alt="QR code to order your free drink">
    </div>

    <p class="scan">📱 Scan with your phone camera to order</p>
    <p class="menu-hint">Pick your nail tech, pick your drink — we'll bring it right over.</p>
    <p class="foot">Complimentary for manicure &amp; pedicure guests · 21+ for alcohol</p>
  </div>
</body>
</html>
